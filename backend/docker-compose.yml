version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: leavemanagement_db
    environment:
      POSTGRES_DB: leavemanagement
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-network

  backend:
    image: leavemanagement_api
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    container_name: leavemanagement_api
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=leavemanagement;Username=postgres;Password=admin123
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - postgres
    networks:
      - backend-network

volumes:
  pgdata:

networks:
  backend-network:
    driver: bridge